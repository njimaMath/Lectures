<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>収束と極限の基本</title>
  <script>
  MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']]
    }
  };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <style>
    :root {
      --primary-color: #4a86e8;
      --secondary-color: #6aa84f;
      --background-color: #f9f9f9;
      --text-color: #333;
      --highlight-color: #fff9e6;
      --border-color: #e0e0e0;
    }
    
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      line-height: 1.6;
      color: var(--text-color);
      background-color: var(--background-color);
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }
    
    h1 {
      color: var(--primary-color);
      border-bottom: 2px solid var(--primary-color);
      padding-bottom: 10px;
      margin-top: 20px;
      font-size: 1.8rem;
    }
    
    h2 {
      color: var(--secondary-color);
      border-left: 4px solid var(--secondary-color);
      padding-left: 10px;
      margin-top: 30px;
      font-size: 1.4rem;
    }
    
    ul, ol {
      padding-left: 30px;
    }
    
    li {
      margin-bottom: 8px;
    }
    
    p {
      text-align: justify;
    }
    
    strong {
      color: #d62c1a;
    }
    
    .definition-box {
      background-color: #e6f4ea;
      border: 1px solid var(--border-color);
      padding: 15px;
      margin: 15px 0;
      border-radius: 5px;
    }
    
    .remark-box {
      background-color: #e3f2fd;
      border: 1px solid #90caf9;
      padding: 15px;
      margin: 15px 0;
      border-radius: 5px;
    }
    
    .property {
      margin-left: 20px;
      margin-bottom: 15px;
    }
    
    .proof-steps {
      background-color: #e8f0fe;
      padding: 15px;
      border-radius: 5px;
    }
    
    .math-display {
      overflow-x: auto;
      padding: 10px 0;
    }
    
    @media (max-width: 600px) {
      body {
        padding: 10px;
      }
      
      h1 {
        font-size: 1.5rem;
      }
      
      h2 {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>
  <h1>第1回講義ノート：収束と極限の基本</h1>


  <h2>4. 関数と関数の極限</h2>
  <div class="definition-box">
    <p>関数 $f$ とは、定義域の各要素 $x \in \mathbb{R}$ に対して、ちょうど一つの値 $f(x)$ を対応させる規則である。</p>
  </div>
    
  <div class="definition-box">
    <p>$x \to a$ のとき $f(x) \to b$ であるとき、$\lim_{x\to a}f(x)=b$ あるいは $f(x) \to b$ $(x \to a)$ と表記する。</p>
  </div>
  
  <div class="remark-box">
    <p>分母が $x \to a$ で $0$ になるときは約分を考える。</p>
  </div>


</body>
</html>
